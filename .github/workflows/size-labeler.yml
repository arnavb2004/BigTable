name: "PR Size Labeler"
on: pull_request

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: pascalgn/size-label-action@v0.5.5
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          sizes: >
            {
              "XS": 10,
              "S": 50,
              "M": 200,
              "L": 500,
              "XL": 1000
            }