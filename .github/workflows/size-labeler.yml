name: "PR Size Labeler"
on: pull_request
jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Size Labeler
        uses: pascalgn/size-label-action@v0.5.5
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          # Using | to ensure the JSON is parsed as a clean block
          sizes: |
            {
              "XS": 20,
              "S": 100,
              "M": 300,
              "L": 800,
              "XL": 1500
            }